version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: campops
      POSTGRES_PASSWORD: campops_secret
      POSTGRES_DB: campops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campops"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://campops:campops_secret@postgres:5432/campops
      JWT_SECRET: local_dev_jwt_secret_change_in_prod
      LINE_CHANNEL_SECRET: your_line_channel_secret
      LINE_CHANNEL_ACCESS_TOKEN: your_line_channel_access_token
      LINE_LOGIN_CHANNEL_ID: your_line_login_channel_id
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: campops
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin_secret
      S3_PUBLIC_BASE_URL: http://localhost:9000/campops
      REDIS_URL: redis://redis:6379/0
      TZ: Asia/Taipei
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_LIFF_ID: your_liff_id_here
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
